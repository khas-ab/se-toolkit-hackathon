version: "3.9"

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recipeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recipepass}
      POSTGRES_DB: ${POSTGRES_DB:-recipe_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipeuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-recipeuser}:${POSTGRES_PASSWORD:-recipepass}@db:5432/${POSTGRES_DB:-recipe_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}  # openai or qwen
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      CRON_DAILY_REMINDER_HOUR: ${CRON_DAILY_REMINDER_HOUR:-8}
      CRON_WEEKLY_SHOPPING_DAY: ${CRON_WEEKLY_SHOPPING_DAY:-sun}
      CRON_WEEKLY_SHOPPING_HOUR: ${CRON_WEEKLY_SHOPPING_HOUR:-9}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        pip install -r requirements.txt &&
        python -c 'from database import engine; from models import Base; Base.metadata.create_all(bind=engine)' &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  # React + Vite frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
